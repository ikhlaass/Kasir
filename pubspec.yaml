name: kasir_nasi_goreng
description: "Aplikasi Kasir Nasi Goreng - POS System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.2

  # Database SQLite
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Format angka & tanggal
  intl: ^0.19.0
  print_bluetooth_thermal: ^1.2.2
  esc_pos_utils_plus: ^2.0.4
  image_picker: ^1.2.2
  path_provider: ^2.1.5
  supabase_flutter: ^2.14.2
  permission_handler: ^12.0.3
  image: ^4.9.1
  pdf: ^3.13.0
  printing: ^5.15.0
  share_plus: ^13.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
